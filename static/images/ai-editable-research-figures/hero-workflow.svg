<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow for editable research figures</title>
  <desc id="desc">A polished workflow diagram showing source material, prompt compiler, image model, editable vector outputs, and delivery surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f2"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#2f6f96"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1b998b"/>
    </linearGradient>
    <linearGradient id="accentC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c96b3b"/>
      <stop offset="100%" stop-color="#df8f4a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#203040" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#47637c"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="150" r="150" fill="#dfecef"/>
  <circle cx="220" cy="760" r="180" fill="#e6ece6"/>
  <rect x="80" y="70" width="1440" height="760" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <text x="130" y="145" fill="#112236" font-size="40" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">The strongest 2026 workflow for AI-made research figures</text>
  <text x="130" y="185" fill="#5d6c7a" font-size="22" font-family="Aptos, Segoe UI, Arial, sans-serif">Plan in structure, render with AI, and ship as an editable artifact.</text>
  <g transform="translate(130 245)">
    <rect width="300" height="430" rx="28" fill="#f5f7f8" stroke="#d6dde4"/>
    <text x="30" y="50" fill="#183147" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">1. Source material</text>
    <rect x="30" y="84" width="240" height="74" rx="18" fill="#ffffff" stroke="#d7dde3"/>
    <text x="52" y="126" fill="#395166" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">Paper excerpt</text>
    <text x="52" y="149" fill="#71808d" font-size="16" font-family="Aptos, Segoe UI, Arial, sans-serif">problem, method, caption</text>
    <rect x="30" y="176" width="240" height="74" rx="18" fill="#ffffff" stroke="#d7dde3"/>
    <text x="52" y="218" fill="#395166" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">Sketch or whiteboard</text>
    <text x="52" y="241" fill="#71808d" font-size="16" font-family="Aptos, Segoe UI, Arial, sans-serif">rough layout and reading order</text>
    <rect x="30" y="268" width="240" height="74" rx="18" fill="#ffffff" stroke="#d7dde3"/>
    <text x="52" y="310" fill="#395166" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">Reference figures</text>
    <text x="52" y="333" fill="#71808d" font-size="16" font-family="Aptos, Segoe UI, Arial, sans-serif">venue taste and field style</text>
    <rect x="30" y="360" width="240" height="42" rx="14" fill="#edf3f9" stroke="#d7dde3"/>
    <text x="52" y="387" fill="#395166" font-size="18" font-family="Aptos, Segoe UI, Arial, sans-serif">Inputs are multimodal</text>
  </g>
  <g transform="translate(485 245)">
    <rect width="355" height="430" rx="28" fill="url(#accentA)" filter="url(#shadow)"/>
    <text x="34" y="54" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">2. Prompt compiler</text>
    <text x="34" y="88" fill="#d5e6f6" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">A reasoning model extracts semantics and style constraints.</text>
    <rect x="34" y="120" width="286" height="86" rx="18" fill="#fdfefe" fill-opacity="0.14" stroke="#bdd7ee" stroke-opacity="0.45"/>
    <text x="54" y="154" fill="#f2f7fb" font-size="18" font-family="Consolas, Menlo, monospace">field: network security</text>
    <text x="54" y="178" fill="#f2f7fb" font-size="18" font-family="Consolas, Menlo, monospace">target: svg + html + prompt</text>
    <text x="54" y="202" fill="#f2f7fb" font-size="18" font-family="Consolas, Menlo, monospace">style: white, premium, clean</text>
    <rect x="34" y="228" width="286" height="154" rx="22" fill="#ffffff"/>
    <text x="58" y="266" fill="#183147" font-size="21" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Parallel outputs</text>
    <text x="58" y="304" fill="#395166" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">Image prompt</text>
    <text x="58" y="334" fill="#395166" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">Editable SVG / HTML / Mermaid</text>
    <text x="58" y="364" fill="#395166" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">Caption and label inventory</text>
  </g>
  <g transform="translate(895 245)">
    <rect width="255" height="430" rx="28" fill="url(#accentB)"/>
    <text x="28" y="54" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">3. Image model</text>
    <text x="28" y="86" fill="#d7f6f2" font-size="18" font-family="Aptos, Segoe UI, Arial, sans-serif">Use for taste, texture, and visual exploration.</text>
    <circle cx="127" cy="184" r="66" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M93 172 C108 146 148 145 161 172 C171 193 159 223 127 230 C93 223 81 194 93 172z" fill="#ffffff" fill-opacity="0.82"/>
    <text x="48" y="300" fill="#ffffff" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">Best use cases</text>
    <text x="48" y="332" fill="#d7f6f2" font-size="17" font-family="Aptos, Segoe UI, Arial, sans-serif">Teaser art</text>
    <text x="48" y="358" fill="#d7f6f2" font-size="17" font-family="Aptos, Segoe UI, Arial, sans-serif">Reference synthesis</text>
    <text x="48" y="384" fill="#d7f6f2" font-size="17" font-family="Aptos, Segoe UI, Arial, sans-serif">Style transfer</text>
  </g>
  <g transform="translate(1200 245)">
    <rect width="260" height="430" rx="28" fill="url(#accentC)"/>
    <text x="28" y="54" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">4. Final deliverables</text>
    <rect x="30" y="92" width="200" height="66" rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <text x="58" y="132" fill="#83461f" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">SVG for PowerPoint</text>
    <rect x="30" y="176" width="200" height="66" rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <text x="58" y="216" fill="#83461f" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">HTML for the web</text>
    <rect x="30" y="260" width="200" height="66" rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <text x="58" y="300" fill="#83461f" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">Typst / Mermaid</text>
    <rect x="30" y="344" width="200" height="66" rx="16" fill="#ffffff" fill-opacity="0.9"/>
    <text x="58" y="384" fill="#83461f" font-size="20" font-family="Aptos, Segoe UI, Arial, sans-serif">Word-ready assets</text>
  </g>
  <path d="M431 460 H475" stroke="#47637c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M840 420 H890" stroke="#47637c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1150 420 H1193" stroke="#47637c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M840 502 C890 502 895 560 1045 560 C1180 560 1180 504 1200 504" stroke="#47637c" stroke-width="4" stroke-dasharray="10 10" fill="none" marker-end="url(#arrow)"/>
  <rect x="130" y="715" width="1330" height="72" rx="22" fill="#f7f2ea" stroke="#e5d5be"/>
  <text x="165" y="760" fill="#5a4634" font-size="24" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Rule of thumb:</text>
  <text x="335" y="760" fill="#6a5848" font-size="22" font-family="Aptos, Segoe UI, Arial, sans-serif">Use image models for visual polish. Use SVG, HTML, Mermaid, or Typst for the final editable truth.</text>
</svg>
