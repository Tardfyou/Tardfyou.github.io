<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Decision matrix for AI-generated academic figures</title>
  <desc id="desc">A 2 by 2 matrix comparing editability and visual richness across SVG, Mermaid, Typst, HTML, draw.io, and image-first workflows.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1f2d3d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="920" fill="url(#bg2)"/>
  <rect x="90" y="70" width="1220" height="780" rx="34" fill="#ffffff" filter="url(#shadow2)"/>
  <text x="130" y="135" fill="#112236" font-size="38" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Choose the output target before you choose the model</text>
  <text x="130" y="176" fill="#657482" font-size="22" font-family="Aptos, Segoe UI, Arial, sans-serif">For research figures, editability and visual richness should be treated as separate axes.</text>
  <line x1="280" y1="740" x2="1130" y2="740" stroke="#7a8b99" stroke-width="3"/>
  <line x1="280" y1="740" x2="280" y2="250" stroke="#7a8b99" stroke-width="3"/>
  <path d="M1130 740 l-18 -10 v20 z" fill="#7a8b99"/>
  <path d="M280 250 l-10 18 h20 z" fill="#7a8b99"/>
  <text x="568" y="805" fill="#435565" font-size="24" font-family="Aptos, Segoe UI, Arial, sans-serif">Higher visual richness and atmospheric polish</text>
  <text x="112" y="527" fill="#435565" font-size="24" transform="rotate(-90 112 527)" font-family="Aptos, Segoe UI, Arial, sans-serif">Higher editability and revision safety</text>
  <line x1="705" y1="260" x2="705" y2="740" stroke="#d4dce4" stroke-width="2" stroke-dasharray="10 10"/>
  <line x1="280" y1="500" x2="1130" y2="500" stroke="#d4dce4" stroke-width="2" stroke-dasharray="10 10"/>
  <text x="365" y="302" fill="#496178" font-size="22" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Editability-first zone</text>
  <text x="850" y="302" fill="#496178" font-size="22" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">High-polish zone</text>
  <text x="350" y="705" fill="#8a7a68" font-size="22" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Do not stop here for paper figures</text>
  <text x="834" y="705" fill="#8a7a68" font-size="22" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Best hybrid zone</text>
  <g>
    <rect x="360" y="350" width="240" height="120" rx="24" fill="#0f4c81" filter="url(#shadow2)"/>
    <text x="392" y="404" fill="#ffffff" font-size="30" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">SVG</text>
    <text x="392" y="438" fill="#dbe9f6" font-size="18" font-family="Aptos, Segoe UI, Arial, sans-serif">best universal final target</text>
  </g>
  <g>
    <rect x="420" y="525" width="230" height="92" rx="22" fill="#4d708f"/>
    <text x="454" y="578" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Mermaid</text>
  </g>
  <g>
    <rect x="360" y="610" width="220" height="92" rx="22" fill="#6a879f"/>
    <text x="394" y="663" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">draw.io</text>
  </g>
  <g>
    <rect x="575" y="380" width="200" height="92" rx="22" fill="#1f8d84"/>
    <text x="627" y="434" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">HTML</text>
  </g>
  <g>
    <rect x="560" y="540" width="210" height="92" rx="22" fill="#2f978f"/>
    <text x="607" y="594" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Typst</text>
  </g>
  <g>
    <rect x="835" y="350" width="300" height="140" rx="26" fill="#cf7c46" filter="url(#shadow2)"/>
    <text x="870" y="404" fill="#ffffff" font-size="30" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Hybrid workflow</text>
    <text x="870" y="438" fill="#fff0e5" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">image prompt + editable reconstruction</text>
    <text x="870" y="466" fill="#fff0e5" font-size="19" font-family="Aptos, Segoe UI, Arial, sans-serif">best for paper-grade visuals</text>
  </g>
  <g>
    <rect x="935" y="560" width="190" height="92" rx="22" fill="#dd9960"/>
    <text x="985" y="614" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Image only</text>
  </g>
  <g>
    <rect x="760" y="610" width="240" height="92" rx="22" fill="#c68d73"/>
    <text x="792" y="664" fill="#ffffff" font-size="28" font-weight="700" font-family="Aptos, Segoe UI, Arial, sans-serif">Moodboard / teaser</text>
  </g>
  <rect x="130" y="740" width="1140" height="72" rx="20" fill="#f4f7f9" stroke="#dbe3ea"/>
  <text x="165" y="785" fill="#455868" font-size="23" font-family="Aptos, Segoe UI, Arial, sans-serif">Recommendation: for CS, security, AI, and software engineering papers, aim for the upper-right hybrid zone, not pure image-only output.</text>
</svg>
