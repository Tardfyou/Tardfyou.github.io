baseURL = "https://tardfyou.github.io/"
title = "Vincent"
theme = "LoveIt"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true
copyright = "Tardfyou"

[pagination]
  pagerSize = 10
  path = "page"

[permalinks]
  posts = "/posts/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.en]
    weight = 1
    languageCode = "en-US"
    languageName = "English"
    title = "Vincent"

    [[languages.en.menu.main]]
      weight = 1
      identifier = "posts"
      name = "Posts"
      url = "/posts/"

    [[languages.en.menu.main]]
      weight = 2
      identifier = "tags"
      name = "Tags"
      url = "/tags/"

    [[languages.en.menu.main]]
      weight = 3
      identifier = "categories"
      name = "Categories"
      url = "/categories/"

    [[languages.en.menu.main]]
      weight = 4
      identifier = "music"
      name = "Music"
      url = "/music/"

    [[languages.en.menu.main]]
      weight = 5
      identifier = "about"
      name = "About"
      url = "/about/"

    [[languages.en.menu.main]]
      weight = 6
      identifier = "messageboard"
      name = "Message Board"
      url = "/messageboard/"

  [languages.zh-cn]
    weight = 2
    languageCode = "zh-CN"
    languageName = "简体中文"
    title = "Vincent"

    [[languages.zh-cn.menu.main]]
      weight = 1
      identifier = "posts"
      name = "文章"
      url = "/posts/"

    [[languages.zh-cn.menu.main]]
      weight = 2
      identifier = "tags"
      name = "标签"
      url = "/tags/"

    [[languages.zh-cn.menu.main]]
      weight = 3
      identifier = "categories"
      name = "分类"
      url = "/categories/"

    [[languages.zh-cn.menu.main]]
      weight = 4
      identifier = "music"
      name = "音乐"
      url = "/music/"

    [[languages.zh-cn.menu.main]]
      weight = 5
      identifier = "about"
      name = "关于"
      url = "/about/"

    [[languages.zh-cn.menu.main]]
      weight = 6
      identifier = "messageboard"
      name = "留言板"
      url = "/messageboard/"

[params]
  defaultTheme = "dark"
  dateFormat = "2006-01-02"
  title = "Vincent"
  description = "Vincent's Blog"
  images = ["/img/cat.jpg"]

  [params.author]
    name = "Tardfyou"
    email = "3143596095@qq.com"
    link = "https://github.com/Tardfyou"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"

    [params.header.title]
      name = "Vincent"
      typeit = false

  [params.footer]
    enable = true
    hugo = false
    copyright = true
    author = true
    since = 2023
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>'

  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.app]
    title = "Vincent"
    noFavicon = true
    themeColor = "#111418"
    iconColor = "#5bbad5"
    tileColor = "#da532c"

  [params.search]
    enable = true
    type = "pagefind"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false

    [params.search.pagefind]
      basePath = "/_pagefind/"

  [params.home]
    rss = 10

    [params.home.profile]
      enable = true
      avatarURL = "/img/cat.jpg"
      title = "Vincent"
      subtitle = "notes, music, and quiet experiments"
      typeit = false
      social = true
      disclaimer = ""

    [params.home.posts]
      enable = true
      paginate = 6

  [params.social]
    GitHub = "Tardfyou"
    Email = "3143596095@qq.com"

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = true
    linkToMarkdown = false
    rssFullText = false

    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true

    [params.page.code]
      copy = true
      maxShownLines = 100

    [params.page.math]
      enable = true
      copyTex = true
      mhchem = true

    [params.page.share]
      enable = false

    [params.page.comment]
      enable = true

      [params.page.comment.utterances]
        enable = true
        repo = "Tardfyou/Tardfyou.github.io"
        issueTerm = "pathname"
        label = "comment"
        lightTheme = "github-light"
        darkTheme = "github-dark"
