<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenSteamTool high-level data flow</title>
  <desc id="desc">A non-operational diagram showing how Lua metadata is loaded and consumed by package, ownership, manifest, decryption, IPC, and network hooks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="1" stop-color="#171d25"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7fc7d9"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #e8edf3; }
      .muted { fill: #9ba9b6; font-size: 21px; }
      .small { fill: #b7c4cf; font-size: 18px; }
      .box { fill: #1f2a36; stroke: #52697b; stroke-width: 2; rx: 8; }
      .focus { fill: #243846; stroke: #7fc7d9; stroke-width: 2.4; rx: 8; }
      .warn { fill: #372b28; stroke: #d08c65; stroke-width: 2; rx: 8; }
      .line { stroke: #7fc7d9; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #75889a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font-size: 30px; font-weight: 650; }
      .label { font-size: 23px; font-weight: 600; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="56" y="58" class="title">OpenSteamTool: Lua metadata consumed by Steam client hooks</text>
  <text x="56" y="91" class="muted">Mechanism overview only: no real depot keys, tokens, or manifest lists are included.</text>

  <rect x="54" y="134" width="250" height="150" class="focus"/>
  <text x="78" y="176" class="label">Lua bundle</text>
  <text x="78" y="211" class="small">AppID / DepotID</text>
  <text x="78" y="238" class="small">Depot decryption key</text>
  <text x="78" y="265" class="small">Manifest GID override</text>

  <rect x="390" y="119" width="260" height="180" class="box"/>
  <text x="416" y="160" class="label">LuaConfig</text>
  <text x="416" y="196" class="small">DepotKeySet</text>
  <text x="416" y="224" class="small">ManifestOverrides</text>
  <text x="416" y="252" class="small">AccessToken / Ticket maps</text>
  <text x="416" y="280" class="small">case-insensitive helpers</text>

  <rect x="742" y="82" width="224" height="110" class="box"/>
  <text x="766" y="124" class="label">Package hook</text>
  <text x="766" y="160" class="small">inject package-0 app list</text>

  <rect x="742" y="220" width="224" height="110" class="box"/>
  <text x="766" y="262" class="label">Ownership hook</text>
  <text x="766" y="298" class="small">return released + owned</text>

  <rect x="742" y="358" width="224" height="110" class="box"/>
  <text x="766" y="400" class="label">Manifest hook</text>
  <text x="766" y="436" class="small">patch depot GID / request code</text>

  <rect x="742" y="496" width="224" height="110" class="box"/>
  <text x="766" y="538" class="label">Decryption hook</text>
  <text x="766" y="574" class="small">provide depot key bytes</text>

  <rect x="1038" y="151" width="190" height="160" class="warn"/>
  <text x="1062" y="193" class="label">Client view</text>
  <text x="1062" y="229" class="small">library entry appears</text>
  <text x="1062" y="257" class="small">download path may work</text>
  <text x="1062" y="285" class="small">runtime still depends on DRM</text>

  <rect x="1038" y="398" width="190" height="134" class="warn"/>
  <text x="1062" y="440" class="label">Boundary</text>
  <text x="1062" y="476" class="small">server entitlement is not</text>
  <text x="1062" y="504" class="small">actually granted</text>

  <path d="M304 209 C336 209, 354 209, 390 209" class="line"/>
  <path d="M650 175 C686 144, 703 137, 742 137" class="line"/>
  <path d="M650 209 C687 234, 704 257, 742 275" class="line"/>
  <path d="M650 241 C687 302, 704 371, 742 413" class="line"/>
  <path d="M650 271 C691 362, 704 505, 742 551" class="line"/>
  <path d="M966 137 C1000 151, 1014 174, 1038 206" class="thin"/>
  <path d="M966 275 C1002 269, 1017 257, 1038 242" class="thin"/>
  <path d="M966 413 C1006 418, 1018 443, 1038 463" class="thin"/>
  <path d="M966 551 C1011 537, 1020 506, 1038 482" class="thin"/>

  <text x="54" y="660" class="muted">The Lua file is a metadata table. The behavioral change comes from C++ detours installed inside the Steam process.</text>
</svg>
